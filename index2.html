<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAILAMOS MEXICO ZAICHECK - PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #ticketImpresion, #ticketImpresion *, #ticketCorte, #ticketCorte * { visibility: visible; }
            #ticketImpresion, #ticketCorte { position: absolute; left: 0; top: 0; width: 100%; color: #000 !important; background: #fff !important; }
            .no-print { display: none !important; }
        }
        #listaRetiros::-webkit-scrollbar { width: 4px; }
        #listaRetiros::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans relative">

    <!-- Pantallas de Login, App, Modales (Ticket, Escaner, Pase, Corte) -->
    <!-- [Mismo código original de pantallas omitido para brevedad, insertar aquí] -->
    
    <!-- MODAL EDICIÓN DE REGISTRO (NUEVO) -->
    <div id="modalEdicion" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
        <div class="bg-gray-800 p-6 rounded-2xl max-w-sm w-full border border-gray-700">
            <h2 class="text-xl font-bold text-indigo-400 mb-4">Editar Registro</h2>
            <form id="formEdicion" class="space-y-3">
                <input type="hidden" id="editId">
                <div>
                    <label class="block text-[10px] uppercase text-gray-400">Nombre</label>
                    <input type="text" id="editNombre" required class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-white">
                </div>
                <div>
                    <label class="block text-[10px] uppercase text-gray-400">Modo de Acceso</label>
                    <select id="editModo" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-white"></select>
                </div>
                <div>
                    <label class="block text-[10px] uppercase text-gray-400">Forma de Pago</label>
                    <select id="editPago" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-white">
                        <option value="Efectivo">💵 Efectivo</option>
                        <option value="Transferencia">📱 Transf.</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] uppercase text-gray-400">Precio ($)</label>
                    <input type="number" id="editPrecio" required step="0.01" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-white">
                </div>
                <div class="flex gap-2 mt-4">
                    <button type="submit" class="flex-1 bg-indigo-600 py-2 rounded text-white font-bold cursor-pointer">Guardar Cambios</button>
                    <button type="button" onclick="cerrarEdicion()" class="bg-gray-700 px-4 py-2 rounded text-white cursor-pointer">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        // ... [Configuración de Firebase y variables globales igual que original] ...
        
        // --- LÓGICA DE EDICIÓN AGREGADA ---
        window.abrirEdicion = (id) => {
            const reg = registros.find(r => r.id === id);
            if (!reg) return;

            const selectModo = document.getElementById('editModo');
            selectModo.innerHTML = Object.keys(PRECIOS_SOPORTE).map(m => `<option value="${m}">${m}</option>`).join('');

            document.getElementById('editId').value = reg.id;
            document.getElementById('editNombre').value = reg.nombre;
            document.getElementById('editModo').value = reg.modo;
            document.getElementById('editPago').value = reg.tipoPago || 'Efectivo';
            document.getElementById('editPrecio').value = reg.precio;
            document.getElementById('modalEdicion').classList.remove('hidden');
        };

        window.cerrarEdicion = () => document.getElementById('modalEdicion').classList.add('hidden');

        document.getElementById('editModo').addEventListener('change', (e) => {
            document.getElementById('editPrecio').value = PRECIOS_SOPORTE[e.target.value] || 0;
        });

        document.getElementById('formEdicion').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            await update(ref(db, `jornadas/${jornadaActivaId}/asistencias/${id}`), {
                nombre: document.getElementById('editNombre').value,
                modo: document.getElementById('editModo').value,
                tipoPago: document.getElementById('editPago').value,
                precio: parseFloat(document.getElementById('editPrecio').value),
                editado: true,
                fechaEdicion: new Date().toLocaleTimeString()
            });
            alert("Registro actualizado.");
            cerrarEdicion();
        });

        // --- EN TU FUNCIÓN RENDERALL, AGREGA EL BOTÓN ---
        // Ejemplo para tabla desktop:
        // <td class="py-3 px-1 text-center"><button onclick="abrirEdicion('${r.id}')" ${esModoHistorico ? 'disabled' : ''} class="cursor-pointer">✏️</button></td>

        // ... [Resto de tus funciones originales: renderAll, generarCorteCaja, etc.] ...
    </script>
</body>
</html>
